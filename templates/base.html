<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SportXBetAura - Premium Sports Betting Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                💰 SportXBetAura
            </div>
            <ul class="navbar-menu">
                <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a></li>
                <li><a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="/events" class="nav-link {% if request.path == '/events' %}active{% endif %}">Events</a></li>
                <li><a href="/betting" class="nav-link {% if request.path == '/betting' %}active{% endif %}">Place Bet</a></li>
                <li><a href="/odds-analysis" class="nav-link {% if request.path == '/odds-analysis' %}active{% endif %}">Best Odds</a></li>
                <li><a href="/parlay" class="nav-link {% if request.path == '/parlay' %}active{% endif %}">Parlay</a></li>
                <li><a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}">History</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 SportXBetAura | Premium Sports Betting Platform</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
